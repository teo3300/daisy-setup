# vim:foldmethod=marker:foldlevel=0

# NOTE: Template configuration
#       This file is a template configuration for nginx running inside docker
#       When the container starts, the content of this file is copied in
#       /etc/nginx/nginx.conf,
#       Additionally, specified environment variables are resolved
# To avoid this behavior from disrupting nginx's internal variables, prepend
#       them with $ instead of just $
# Be sure to pass variables to the container to make them available and to
#       specify them in envsubst, this is done to avoid breaking regex
# Use guard variable "GEOBLOCK" to allow only whitelisted countries and local ips to
#       website or define custom rules
# Use guard variable "PASSWORD" to restrict website acess with a password
# Use guard variable "TOTP" to restrict website access witha TOTP (uses a third party module)

# Enable Geoip2 (needs building additional image)
load_module modules/ngx_http_geoip2_module.so;
load_module modules/ngx_http_auth_totp_module.so;

events {
  worker_connections 1024;
}

# NOTE: If a 403 is returned, check that dns query is resolved by pihole, otherwise
#       the IP might be an external one

## HTTPS server template
