# SearXNG {{{
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name searx.${SERVER_DOMAIN};

  ssl_certificate /etc/letsencrypt/live/searx.${SERVER_DOMAIN}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/searx.${SERVER_DOMAIN}/privkey.pem;

  location / {
    
    # - Local IP
    allow 192.168.1.0/24;
    deny all;

    proxy_set_header X-Forwarded-For $remote_addr;

    proxy_pass http://searxng:8080;
  }

}
# }}}

# SearXNG (public) {{{
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name find.${SERVER_DOMAIN};

  ssl_certificate /etc/letsencrypt/live/find.${SERVER_DOMAIN}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/find.${SERVER_DOMAIN}/privkey.pem;

  location / {

    ${GEOBLOCK}
    ${TOTP}

    proxy_set_header X-Forwarded-For $remote_addr;

    proxy_pass http://searxng:8080;
  }

}
# }}}

  # Nextcloud {{{
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
  
    server_name drive.${SERVER_DOMAIN};
  
    ssl_certificate /etc/letsencrypt/live/drive.${SERVER_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drive.${SERVER_DOMAIN}/privkey.pem;
  
    allow 192.168.1.0/24;
    allow 10.100.0.0/24;
    deny all;

    rewrite ^/remote\.php/dav/remote\.php/dav/(.*)$ /remote.php/dav/$1;

    location / {
      proxy_pass http://nextcloud-frontend:80;
    }

    # Redirect dav
    location /.well-known/carddav {
        return 301 $scheme://$host/remote.php/dav;
    }
    
    location /.well-known/caldav {
        return 301 $scheme://$host/remote.php/dav;
    }
    
    location ^~ /.well-known {
        return 301 $scheme://$host/index.php$uri;
    }
  }
  # }}}

