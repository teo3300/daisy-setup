http {

  access_log /dev/stdout;
  access_log /etc/log/access.log combined;
  error_log /etc/log/error.log error;

  # Provide information on the MIME types
  include /etc/nginx/mime.types;

  server_tokens off;
  charset utf-8;

  # Load Geoip2 DB
  geoip2 /etc/nginx/geoip/GeoLite2-Country.mmdb {
    # Define query db[<ip (arg)>][country][iso_code]
    $geoip_country_code country iso_code;
  }

  # Define access rule as a map with name
  map $geoip_country_code $geoip_only_block {
      # Default: block
      default 1;
      # Allow specified countries
      ${COUNTRY_WHITELIST}
  }

  # Check against local ips
  map $remote_addr $local_block {
    default             1;
    ~^10\.100\.0\.(.*)  0;
    ~^192\.168\.1\.(.*) 0;
  }
  
  # If one of the two passes: pass
  map $local_block$geoip_only_block $geo_block {
      default 0;
      11 1;
  }

# ## NOTE: Everything running under port 443 must be disabled on the first run to allow certbot to properly create the certificates
#   # Port 443 entrypoint {{{
  server {
    # Enforce https
    listen 443 default_server ssl;
    listen [::]:443 ssl;
    http2 on;

    # Default path && default index
    root /var/www/html;
    index index.html index.php;
 
    # Certificates
    server_name ${SERVER_DOMAIN};
    ssl_certificate /etc/letsencrypt/live/${SERVER_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SERVER_DOMAIN}/privkey.pem;
    
    # # Protect while in dev
    # allow 192.168.1.0/24;
    # allow 10.100.0.0/24;
    # deny all;
 
    # Charset
    charset utf-8;

    # Default behavior: serve files straight from nginx
    location / {

        ${GEOBLOCK}

        root /var/www/html;
        # Just serve file, later will handle parameters
        try_files $uri $uri/ /index.html /index.php =404;
        # autoindex on;
        # Default hit uri, uri/ and index.php with eventual query, 404 on fail
        # try_files $uri $uri /index.php$query_string =404;
    }

    # location = .... # <- Exact match
    # Ignore favicon.ico 404 miss
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; }

    # Maximum request size (might have to change this)
    client_max_body_size 100m;

    # Specify error pages
    # TODO: I WANT IT CUSTOMMMMM
    error_page 404 /index.php;

    # Case sensitive regex: when requesting a PHP file: run php
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php-fpm:9000;
        # Default use /index.php
        fastcgi_index index.php;
        # Specify which script to use
        fastcgi_param SCRIPT_FILENAME /var/www/html/$fastcgi_script_name;
        # # Pass proper arguments
        fastcgi_param QUERY_STRING "";
        # fastcgi_param QUERY_STRING    $query_string;
        # fastcgi_param REQUEST_METHOD  $request_method;
        # fastcgi_param CONTENT_TYPE    $content_type;
        # fastcgi_param CONTENT_LENGTH  $content_length;
    }

  }
  # }}}

  # Bitwarden {{{
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
  
    server_name bitwarden.${SERVER_DOMAIN};
  
    ssl_certificate /etc/letsencrypt/live/bitwarden.${SERVER_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bitwarden.${SERVER_DOMAIN}/privkey.pem;
      
    # Always resolved as 10.100
    # allow 192.168.1.0/24;
    allow 10.100.0.0/24;
    deny all;
  
    location / {
      proxy_pass http://bitwarden:80;
    }
  }
  # }}}

  # Gitea {{{
